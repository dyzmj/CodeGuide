# CodeGuide Workflow Add New Documentation Section

## Action

Follow the add-new-documentation-section workflow:
1. Update docs/.vuepress/config.js to register the new section/article in navigation or sidebar.
2. Add or update markdown file in docs/md/ or docs/md/project/ with the new content.
3. Add related images to docs/.vuepress/public/images/article/ in an appropriate subfolder.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: docs/.vuepress/config.js, docs/md/**/*.md, docs/.vuepress/public/images/article/**/*

